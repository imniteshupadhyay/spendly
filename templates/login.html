{% extends "base.html" %}

{% block title %}Sign in — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to your Spendly account</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email"
                           class="form-input" placeholder="nitish@example.com"
                           value="{{ email or '' }}"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password"
                               class="form-input" placeholder="Your password"
                               required>
                        <button type="button" class="password-toggle"
                                onclick="const p=document.getElementById('password');const show=p.type==='password';p.type=show?'text':'password';this.textContent=show?'Hide':'Show';">Show</button>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Sign in</button>
            </form>
        </div>

        <p class="auth-switch">
            Don't have an account?
            <a href="{{ url_for('register') }}">Create one free</a>
        </p>

    </div>
</section>

{% endblock %}
